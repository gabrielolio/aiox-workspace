# Fonte: Dossie panorama-projeto-diretor.md + pesquisa de mercado
# Uso: Compartilhado entre Bamaq e Fialho Motors
# Agentes: Briefer, Muse, Guardiao

brand:
  name: "GWM - Great Wall Motors"
  origin: "China"
  brazil_hq: "Sao Paulo"
  market: "Brasil"

  market_data:
    vehicles_sold_2025: 42785
    growth_vs_target: "+22%"
    concessionarias: 130
    new_models_2026: 12
    notable: "Primeira marca no Brasil a fazer comercial 100% com IA"
    digital:
      ecommerce: true
      app: true
      sales_outside_hours: "23%"

  content_guidelines:
    freedom_level: "ALTA"
    strictness: "BAIXA"
    tone: "Moderno, tecnologico, acessivel, jovem"
    restrictions:
      - "Logo GWM visivel (inicio ou final)"
      - "Nao comparar diretamente com concorrentes por nome"
    permissions:
      - "Criatividade em formatos (reels, POV, lifestyle)"
      - "Humor e informalidade permitidos"
      - "Conteudo UGC (user generated) incentivado"

  subtitle_typography:
    # Specs para legendas automaticas (Whisper) em videos Reels/Stories
    # Fonte oficial: GWM Sans (GRATUITA — desenvolvida com Monotype + Akira Kobayashi)
    # Download: gwm.com.cn/gwmsans/fontdownload.html
    # Alternativas por modelo abaixo. Referencia: knowledge-base/brands/brand-guidelines-reference.md
    fonte_oficial: "GWM Sans"        # CORRIGIDO: Manrope nao e fonte oficial GWM
    fonte_download: "gwm.com.cn/gwmsans/fontdownload.html"
    cores_confirmadas:
      corporativo_azul: "#003087"    # CONFIRMADO — logo GWM
      branco: "#FFFFFF"
    cores_incertas:
      haval_vermelho: "~#CC0000"     # INCERTO — hex nao publicado oficialmente
      tank_chrome: "sem hex oficial" # INCERTO — extrair de SVG no Brandfetch

    # Tank 300 — bold, aventura, off-road, neo-retro
    tank_300:
      fonte_alternativa: "Barlow Condensed" # CONFIRMADO como alternativa coerente
      peso: "700"                    # Bold — CONFIRMADO pelo carater do veiculo
      caixa: "UPPERCASE"             # ALL CAPS — CONFIRMADO para Tank
      letter_spacing: "0.08em"
      line_height: "1.3"
      cor_texto: "#FFFFFF"
      sombra: "rgba(0,0,0,0.75) blur 6px offset 0 2px"
      destaque_palavras_chave: null  # REMOVIDO: #D4A843 nao e cor oficial GWM
      contorno: "1px solid rgba(0,0,0,0.4)"  # Outline fino aceitavel para Tank — INFERIDO
      posicao_vertical: "inferior"
      margem_inferior: "10%"
      alinhamento_horizontal: "esquerda"
      margem_esquerda: "6%"
      tamanho_relativo: "5%"
      max_chars_por_linha: 36

    # Haval H6 / H6 GT — urbano, familia, tecnologico
    haval_h6:
      fonte_alternativa: "Plus Jakarta Sans" # CORRIGIDO: mais coerente que Manrope para Haval urbano
      peso: "500"                    # Medium — INFERIDO
      caixa: "Sentence case"         # INFERIDO — coerente com tom familiar/acessivel
      letter_spacing: "0.03em"
      line_height: "1.45"
      cor_texto: "#FFFFFF"
      sombra: "rgba(0,0,0,0.55) blur 4px offset 0 1px"
      contorno: "none"               # Outline nao recomendado para Haval
      posicao_vertical: "inferior"
      margem_inferior: "8%"
      alinhamento_horizontal: "centro"
      margem_lateral: "5%"
      tamanho_relativo: "4.2%"
      max_chars_por_linha: 44

    regras_criticas:
      - "Logo GWM (azul #003087) nunca sobre area de legenda"
      - "Baixar GWM Sans em gwm.com.cn/gwmsans — e gratuita e oficial"
      - "Tank 300: bold + uppercase e a assinatura — nao suavizar"
      - "Haval H6: sentence case — mais acessivel, tom familiar/urbano"
      - "Cores hex Haval/Tank nao sao publicadas oficialmente — extrair de SVG no Brandfetch"
      - "NAO usar #D4A843 como cor GWM — nao e cor oficial da marca"
      - "Fundo pill/capsula aceitavel para GWM (nao usar em Porsche)"
      - "Animacao: slide-up 150ms aceitavel — mais dinamico que Porsche"
      - "Whisper erra nomes — revisar sempre: Haval, Havaleiros, GWM, Tank, Poer, etc."

