# Squad Design Blueprint — King Quality Guard
# Generated by *design-squad (Craft/squad-creator)
# Date: 2026-03-06
# Problema resolvido: Gabriel precisa parar o processo criativo para validar manualmente
# Solucao: Squad roda automaticamente no final de cada implementacao e entrega um laudo

squad:
  name: king-quality-guard
  description: "Squad de qualidade autonomo para o KING System — valida implementacoes contra stories, TypeScript, integracao e arquitectura. Roda sem interrupcoes."
  domain: quality-assurance
  version: "1.0.0"

problem_statement: |
  Gabriel (nao programador) precisa parar o fluxo criativo toda vez que uma implementacao
  termina para confirmar manualmente se tudo esta correto. Isso e chato, lento e desnecessario.
  O squad King Quality Guard resolve isso: voce termina de implementar, chama *check [story-id],
  e recebe um laudo completo em portugues simples sem precisar entender codigo.

design_principles:
  - "Fire and forget: invoca uma vez, recebe o laudo no final"
  - "Portugues simples: nenhum jargao tecnico no relatorio"
  - "Autonomo: nao pede confirmacao no meio — so relata no final"
  - "Story-first: sempre valida contra os Acceptance Criteria da story"
  - "Honesto: nao mascara falhas — diz exatamente o que esta errado"

analysis:
  entities:
    - Story (arquivo .md com Acceptance Criteria)
    - Codigo TypeScript (src/)
    - Integracao (roteamento Diretor, imports, exports)
    - Relatorio de Qualidade (resultado final)
  workflows:
    - quality-check (story-id → validar AC → validar TS → validar integracao → relatorio)
    - story-audit (le story, extrai criterios, verifica contra codigo)
  stakeholders:
    - Gabriel Olio (dono do projeto, nao programador — precisa de relatorio em portugues simples)
    - Vitor King (usuario final do KING system — nao participa do dev)

recommendations:
  lead_agent: sentinel
  agents:
    - id: sentinel
      role: "Orquestrador do quality check — recebe story-id, invoca todos os checks, compila relatorio final"
      commands:
        - "*check [story-id]"
        - "*check-all"
        - "*status"
      confidence: 0.97
      rationale: "Agente central que coordena tudo. Gabriel so precisa falar com ele."

    - id: story-auditor
      role: "Especialista em Acceptance Criteria — le a story, extrai cada criterio e verifica se o codigo o satisfaz"
      commands:
        - "*audit [story-id]"
        - "*list-criteria [story-id]"
      confidence: 0.95
      rationale: "As stories sao a fonte de verdade. Se o codigo nao satisfaz os ACs, nao esta pronto."

  tasks:
    - id: run-quality-check
      owner: sentinel
      description: "Ponto de entrada principal — aceita story-id, executa todos os checks em sequencia, retorna relatorio"
      steps:
        - "Localizar story em docs/stories/"
        - "Invocar check-story-criteria"
        - "Invocar check-typescript"
        - "Invocar check-integration"
        - "Invocar generate-report"
      output: "Relatorio completo ✅/❌ em portugues"

    - id: check-story-criteria
      owner: story-auditor
      description: "Le o arquivo de story, extrai todos os [ ] checkboxes de Acceptance Criteria, verifica cada um contra o codigo"
      output: "Lista de criterios: ✅ satisfeito | ❌ nao satisfeito | ⚠️ nao verificavel automaticamente"

    - id: check-typescript
      owner: sentinel
      description: "Executa npm run typecheck e npm run lint, parseia saida, reporta erros em portugues simples"
      output: "✅ Codigo sem erros | ❌ X erros encontrados (listados em portugues)"

    - id: check-integration
      owner: sentinel
      description: "Verifica se novos arquivos estao corretamente integrados (imports no router, exports, referencias no SQLite)"
      output: "✅ Integracao ok | ❌ Ponto de integracao faltando: [descricao]"

    - id: generate-report
      owner: sentinel
      description: "Consolida resultados de todos os checks em relatorio final simples, sem jargao tecnico"
      output: "Relatorio markdown com score geral, lista de ok/problemas, proximo passo recomendado"

  checklists:
    - id: story-dod
      description: "Definition of Done para cada story do KING System"
      items:
        - "Todos os Acceptance Criteria marcados como [x] no arquivo de story"
        - "npm run typecheck passa sem erros"
        - "npm run lint passa sem erros"
        - "Novos arquivos registrados no File List da story"
        - "Integracao com modulos existentes verificada"
        - "Nenhuma informacao inventada (ex: respostas do Guardiao so do YAML)"
