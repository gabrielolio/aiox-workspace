# Squad Design Blueprint — Fialho Motors
# Generated by *design-squad (Orion/aios-master)
# Date: 2026-03-04

squad:
  name: fialho-motors
  description: "Squad de gestão manual de conteúdo para Fialho Motors — seminovos multimarcas, Campo Grande/MS"
  domain: content-management

analysis:
  entities:
    - Veículo (Haval H6, Tank 300, Poer P30)
    - Post (Feed, Story, Reel, Carrossel)
    - Template (feed, story, reel, flyer)
    - Calendário Editorial
    - Entrega Semanal
    - Brandbook (cores, tipografia, tom)
  workflows:
    - content-creation (fotos → tratamento → template → post)
    - whatsapp-engagement (flyer semanal → aprovação Marcos → grupo Havaleiros)
    - calendar-planning (rotação mensal de modelos × formatos)
    - delivery-tracking (log → checklist semanal → relatório mensal)
  integrations:
    - Instagram (@fialhomotorscg)
    - WhatsApp (Havaleiros & Havaleiras, 104 membros)
    - ShopCar (source de leads)
  stakeholders:
    - Jucilene Diass (dona, decisora)
    - Gigante (co-owner, gerente)
    - Marcos (admin grupo WhatsApp)
    - Vitor King (criador de conteúdo)

recommendations:
  agents:
    - id: content-producer
      role: "Produz e gerencia posts (feed, stories, reels, carrossel) seguindo templates e brandbook"
      commands:
        - "*create-post"
        - "*create-whatsapp-flyer"
      confidence: 0.94
      user_added: false
      user_modified: false

    - id: calendar-planner
      role: "Planeja calendário editorial mensal com rotação de modelos e formatos"
      commands:
        - "*plan-month"
      confidence: 0.89
      user_added: false
      user_modified: false

    - id: delivery-tracker
      role: "Rastreia entregas semanais e progresso mensal"
      commands:
        - "*log-delivery"
        - "*checklist-week"
        - "*monthly-report"
      confidence: 0.90
      user_added: false
      user_modified: true
      modification_note: "Simplificado de client-manager para delivery-tracker — 1 cliente não justifica CRM"

  tasks:
    - name: create-post
      agent: content-producer
      entrada:
        - fotos do veículo
        - modelo (Haval H6 / Tank 300 / Poer P30)
        - formato (feed / story / reel / carrossel)
      saida:
        - post finalizado com template aplicado
        - arquivo pronto para publicação
      confidence: 0.92

    - name: create-whatsapp-flyer
      agent: content-producer
      entrada:
        - modelo destaque da semana
        - informações do veículo
      saida:
        - flyer para grupo Havaleiros
      confidence: 0.85

    - name: plan-monthly-calendar
      agent: calendar-planner
      entrada:
        - mês alvo
        - modelos disponíveis no estoque
      saida:
        - calendário com 12 posts
        - rotação de modelos (Semana 1 Institucional → Semana 2 Haval → Semana 3 Tank/Poer → Semana 4 Mix)
        - formato por dia (Mon/Wed/Fri)
      confidence: 0.91

    - name: log-delivery
      agent: delivery-tracker
      entrada:
        - post entregue
        - data de publicação
        - tipo/formato
      saida:
        - registro no histórico de entregas
      confidence: 0.87

    - name: weekly-checklist
      agent: delivery-tracker
      entrada:
        - semana atual
      saida:
        - checklist dos 3 posts da semana
        - status de cada (pendente / em produção / entregue)
      confidence: 0.90

    - name: monthly-report
      agent: delivery-tracker
      entrada:
        - mês de referência
      saida:
        - relatório (X/12 posts entregues)
        - modelos cobertos
        - formatos utilizados
        - recomendações para próximo mês
      confidence: 0.86

  template: basic
  config_mode: extend

metadata:
  created_at: "2026-03-04T00:00:00Z"
  source_docs:
    - projects/fialho-motors/roadmap.md
    - projects/fialho-motors/README.md
    - knowledge-base/clients/fialho-motors.yaml
    - docs/dossies/plano-valor-vitor-fialho-motors.md
    - docs/dossies/auditoria-realidade-fialho-motors.md
  user_adjustments: 4
  adjustment_log:
    - "Removido agent client-manager → substituído por delivery-tracker (mais focado)"
    - "Removida task treat-photos.md (redundante com create-post)"
    - "Removida task suggest-daily-content.md (redundante com plan-monthly-calendar)"
    - "Ajustados commands do delivery-tracker"
  overall_confidence: 0.90
